apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: sentiment-analysis
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: your-registry/sentiment-backend:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: KAFKA_BROKERS
          valueFrom:
            configMapKeyRef:
              name: sentiment-config
              key: KAFKA_BROKERS
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: sentiment-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: sentiment-config
              key: DB_PORT
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: sentiment-config
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: sentiment-secrets
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sentiment-secrets
              key: DB_PASSWORD
        - name: MEMCACHED_HOST
          valueFrom:
            configMapKeyRef:
              name: sentiment-config
              key: MEMCACHED_HOST
        - name: SPARK_MASTER_URL
          valueFrom:
            configMapKeyRef:
              name: sentiment-config
              key: SPARK_MASTER_URL
        - name: TWITTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: sentiment-secrets
              key: TWITTER_API_KEY
        - name: TWITTER_API_SECRET
          valueFrom:
            secretKeyRef:
              name: sentiment-secrets
              key: TWITTER_API_SECRET
        - name: TWITTER_BEARER_TOKEN
          valueFrom:
            secretKeyRef:
              name: sentiment-secrets
              key: TWITTER_BEARER_TOKEN
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: sentiment-analysis
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  selector:
    app: backend
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: sentiment-analysis
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 4
        periodSeconds: 30
      selectPolicy: Max
