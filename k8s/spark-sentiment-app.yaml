apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-sentiment-app
  namespace: sentiment-analysis
  labels:
    app: spark-sentiment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-sentiment
  template:
    metadata:
      labels:
        app: spark-sentiment
    spec:
      containers:
      - name: spark-sentiment
        image: sentiment-spark:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: KAFKA_BROKERS
          valueFrom:
            configMapKeyRef:
              name: sentiment-config
              key: KAFKA_BROKERS
        - name: KAFKA_TWEET_TOPIC
          value: "tweet_topic"
        - name: KAFKA_SENTIMENT_TOPIC
          value: "sentiment_topic"
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: sentiment-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: sentiment-config
              key: DB_PORT
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: sentiment-secrets
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sentiment-secrets
              key: DB_PASSWORD
        - name: DB_NAME
          value: "sentiment_db"
        - name: MODEL_PATH
          value: "/app/models/sentiment_model"
        - name: CHECKPOINT_PATH
          value: "/app/checkpoints"
        - name: SPARK_MASTER_URL
          value: "spark://spark-master:7077"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        volumeMounts:
        - name: model-storage
          mountPath: /app/models
        - name: checkpoint-storage
          mountPath: /app/checkpoints
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: spark-model-pvc
      - name: checkpoint-storage
        persistentVolumeClaim:
          claimName: spark-checkpoint-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: spark-model-pvc
  namespace: sentiment-analysis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: spark-checkpoint-pvc
  namespace: sentiment-analysis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
